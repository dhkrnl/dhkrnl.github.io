<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e03611"/>
      <stop offset="30%" stop-color="#f06b1e"/>
      <stop offset="65%" stop-color="#f5a800"/>
      <stop offset="100%" stop-color="#fde040"/>
    </linearGradient>
    <clipPath id="sq"><rect width="200" height="200" rx="42"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="42" fill="#0c1828"/>
